<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Piano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="top-bar">
        <div class="logo">DP</div>

        <p class="info">
            Play notes by clicking keys or using the keyboard.
            Built with the Web Audio API and keyboard events.
        </p>
    </div>

    <div class="controls">

        <div class="octave-controls">
            <button id="octaveDown">Octave -</button>
            <p>Octave: <span id="octaveValue">4</span></p>
            <button id="octaveUp">Octave +</button>
        </div>

        <div class="sound-controls">
            <label>Wave:</label>

            <select id="waveType">
                <option value="sine">sine</option>
                <option value="triangle">triangle</option>
                <option value="sawtooth">sawtooth</option>
                <option value="square">square</option>
            </select>

            <label>Volume:</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
        </div>

    </div>

    <div class="piano">

        <button class="white key" data-note="C">C</button>
        <button class="white key" data-note="D">D</button>
        <button class="white key" data-note="E">E</button>
        <button class="white key" data-note="F">F</button>
        <button class="white key" data-note="G">G</button>
        <button class="white key" data-note="A">A</button>
        <button class="white key" data-note="B">B</button>

        <button class="black csharp">C#</button>
        <button class="black dsharp">D#</button>
        <button class="black fsharp">F#</button>
        <button class="black gsharp">G#</button>
        <button class="black asharp">A#</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
